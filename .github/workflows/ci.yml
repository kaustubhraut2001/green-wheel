name: CI / CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: "postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db"
  REDIS_URL: "redis://localhost:6379/0"
  JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
  ENVIRONMENT: "test"
  DEBUG: "true"
  EXCHANGE_RATE_PROVIDER: "mock"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt aiosqlite

      - name: Run unit tests
        run: |
          pytest tests/unit/ -m unit \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
          ENVIRONMENT: "test"
          EXCHANGE_RATE_PROVIDER: "mock"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ── Integration Tests ───────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: "${{ env.DATABASE_URL }}"

      - name: Run integration tests
        run: |
          pytest tests/integration/ -m integration \
            --cov=app \
            --cov-report=term-missing \
            -v
        env:
          DATABASE_URL: "${{ env.DATABASE_URL }}"
          REDIS_URL: "${{ env.REDIS_URL }}"
          JWT_SECRET_KEY: "${{ env.JWT_SECRET_KEY }}"
          ENVIRONMENT: "test"
          EXCHANGE_RATE_PROVIDER: "mock"

  # ── Deploy to EC2 ────────────────────────────────────────────────────────────
  # Triggered only on push to main — not on PRs
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/green-wheels

            echo "▶ Pulling latest code..."
            git pull origin main

            echo "▶ Rebuilding and restarting containers..."
            docker compose up -d --build --remove-orphans

            echo "▶ Running DB migrations..."
            docker compose exec -T backend alembic upgrade head

            echo "▶ Cleaning up old images..."
            docker image prune -f

            echo "▶ Checking health..."
            sleep 10
            curl -sf http://localhost:8000/api/v1/health \
              && echo "✅ App is live at http://${{ secrets.EC2_HOST }}" \
              || (echo "❌ Health check failed" && exit 1)
